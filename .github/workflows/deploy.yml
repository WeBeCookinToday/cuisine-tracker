name: Deploy

# main   -> published to the site root  (production)
# staging -> published to /staging/      (staging)
on:
  push:
    branches: [main, staging]

# Don't let a main and a staging deploy clobber each other's gh-pages push,
# and serialize the Pages deployment so concurrent runs can't collide (the
# cause of the old "Deployment failed, try again later" errors).
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  # 1) Build the site and push it onto the gh-pages branch
  #    (main -> root, staging -> /staging/, coexisting via keep_files).
  build-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write          # needed to push the built site to the gh-pages branch

    # Selects the matching GitHub Environment so the right Supabase
    # secrets are injected. Create these two environments in
    # Settings -> Environments: "production" and "staging".
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # main deploys to the root; staging deploys into the /staging/ subfolder.
          destination_dir: ${{ github.ref == 'refs/heads/main' && '.' || 'staging' }}
          # keep_files preserves the OTHER environment's folder on each deploy
          # (so a main deploy doesn't wipe /staging/ and vice-versa).
          keep_files: true

  # 2) Serve the just-updated gh-pages branch via the official GitHub Actions
  #    Pages deployment. This replaces the deprecated "legacy" branch builder
  #    (build_type must be set to "workflow" in Settings -> Pages).
  deploy-pages:
    needs: build-deploy
    runs-on: ubuntu-latest

    permissions:
      pages: write             # deploy to Pages
      id-token: write          # OIDC token for deploy-pages

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Grab the whole gh-pages tree (root + /staging/) that step 1 just pushed.
      - uses: actions/checkout@v5
        with:
          ref: gh-pages
          path: site

      # Don't ship the git metadata as part of the served site.
      - name: Strip git metadata
        run: rm -rf site/.git

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
